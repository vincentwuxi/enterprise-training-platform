<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <!-- SEC-007: Content Security Policy (allows Cloudflare Access scripts) -->
    <meta http-equiv="Content-Security-Policy"
      content="default-src 'self';
               script-src 'self' 'unsafe-inline' https://static.cloudflareinsights.com;
               style-src 'self' 'unsafe-inline' https://fonts.googleapis.com;
               font-src 'self' https://fonts.gstatic.com data:;
               img-src 'self' data: blob:;
               connect-src 'self' https://*.cloudflareinsights.com;">
    <!-- Note: X-Frame-Options & frame-ancestors set via Nginx/Cloudflare HTTP headers -->
    <meta http-equiv="X-Content-Type-Options" content="nosniff" />
    <meta name="referrer" content="strict-origin-when-cross-origin" />

    <!-- SEO -->
    <title>AivoloLearn — 企业 AI 培训中心 | 89+ 互动课程</title>
    <meta name="description" content="AivoloLearn 企业级交互式培训平台，涵盖 AI、大模型、编程、基础设施等 11 大领域 89 门专业课程，703 个交互式章节。" />
    <meta name="keywords" content="企业培训,AI培训,大模型,LLM,深度学习,机器学习,编程课程,AivoloLearn" />
    <meta name="author" content="AivoloLearn" />

    <!-- Open Graph / Social sharing -->
    <meta property="og:type" content="website" />
    <meta property="og:title" content="AivoloLearn — 企业 AI 培训中心" />
    <meta property="og:description" content="涵盖 AI、大模型、编程、基础设施等 11 大领域 89 门专业课程的沉浸式学习平台。" />
    <meta property="og:site_name" content="AivoloLearn" />
    <meta property="og:locale" content="zh_CN" />

    <!-- Mobile theme -->
    <meta name="theme-color" content="#060b16" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
